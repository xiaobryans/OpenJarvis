# .github/workflows/jarvis-remote.yml
#
# Jarvis Remote Execution Workflow
# =================================
# Sprint: Sprint 3 FINAL Blocker Closure
# Safe modes: status|test|build|artifact|project-init|code-edit|reassign|escalate
# Forbidden: deploy|delete|push|merge|release|publish

name: Jarvis Remote Execution

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution mode'
        required: true
        default: 'status'
        type: choice
        options:
          - status
          - test
          - build
          - artifact
          - project-init
          - code-edit
          - reassign
          - escalate
      branch:
        description: 'Target branch'
        required: false
        default: 'localhost-get-tool'
      project_path:
        description: 'Project subdirectory (default: repo root)'
        required: false
        default: '.'
      project_id:
        description: 'Generic project ID (not OMNIX-specific)'
        required: false
        default: 'generic-project'
      project_type:
        description: 'Project type for project-init: python | node | generic'
        required: false
        default: 'python'
      task_description:
        description: 'Task description for code-edit (produces diff/patch only)'
        required: false
        default: ''
      worker_id:
        description: 'Stalled worker ID for reassign/escalate'
        required: false
        default: ''
      blocker_description:
        description: 'Exact blocker for escalate mode'
        required: false
        default: ''
      jarvis_task_id:
        description: 'Jarvis task ID for result routing'
        required: false
        default: ''

# contents:write needed for code-edit safe branch creation
# All write ops produce artifacts or branches only — never push to main
permissions:
  contents: write
  actions: read

jobs:
  jarvis-remote:
    name: Jarvis Remote — ${{ github.event.inputs.mode }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Safety gate — reject forbidden modes
        shell: bash
        run: |
          MODE="${{ github.event.inputs.mode }}"
          for f in deploy delete push merge release publish; do
            if [ "$MODE" = "$f" ]; then
              echo "::error::JARVIS_SAFETY_GATE: Mode '$MODE' is BLOCKED. Bryan authorization required."
              exit 1
            fi
          done
          echo "SAFETY_GATE: Mode '$MODE' is permitted."

      # -----------------------------------------------------------------------
      # STATUS (no-op, safe default)
      # -----------------------------------------------------------------------
      - name: Status check
        if: ${{ github.event.inputs.mode == 'status' }}
        run: |
          echo "JARVIS_REMOTE_STATUS=ok" | tee jarvis-status.txt
          echo "MODE=status (no-op)" >> jarvis-status.txt
          echo "BRANCH=${{ github.event.inputs.branch }}" >> jarvis-status.txt
          echo "TASK_ID=${{ github.event.inputs.jarvis_task_id }}" >> jarvis-status.txt
          echo "RUNNER=$(uname -a)" >> jarvis-status.txt
          echo "TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> jarvis-status.txt
          echo "Remote execution runtime: AVAILABLE" >> jarvis-status.txt

      # -----------------------------------------------------------------------
      # CHECKOUT (all modes except status)
      # -----------------------------------------------------------------------
      - name: Checkout repo
        if: ${{ github.event.inputs.mode != 'status' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # PYTHON SETUP
      # -----------------------------------------------------------------------
      - name: Set up Python
        if: >
          ${{ github.event.inputs.mode == 'test' ||
              github.event.inputs.mode == 'build' ||
              github.event.inputs.mode == 'project-init' ||
              github.event.inputs.mode == 'code-edit' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        if: >
          ${{ github.event.inputs.mode == 'test' ||
              github.event.inputs.mode == 'build' ||
              github.event.inputs.mode == 'project-init' ||
              github.event.inputs.mode == 'code-edit' }}
        working-directory: ${{ github.event.inputs.project_path }}
        run: pip install -r requirements.txt 2>&1 | tee jarvis-install.txt || true

      # -----------------------------------------------------------------------
      # TEST
      # -----------------------------------------------------------------------
      - name: Run tests
        if: ${{ github.event.inputs.mode == 'test' }}
        working-directory: ${{ github.event.inputs.project_path }}
        run: |
          python -m pytest tests/ -q --tb=short --no-header 2>&1 | tee jarvis-test-output.txt || true
          echo "TEST_RUN_COMPLETE=true" >> jarvis-test-output.txt

      # -----------------------------------------------------------------------
      # BUILD
      # -----------------------------------------------------------------------
      - name: Run build
        if: ${{ github.event.inputs.mode == 'build' }}
        working-directory: ${{ github.event.inputs.project_path }}
        run: |
          if [ -f "package.json" ]; then
            npm ci 2>&1 | tee jarvis-build-output.txt || true
            npm run build 2>&1 | tee -a jarvis-build-output.txt || true
          elif [ -f "Cargo.toml" ]; then
            cargo build 2>&1 | tee jarvis-build-output.txt || true
          else
            echo "No recognized build system found." | tee jarvis-build-output.txt
          fi
          echo "BUILD_RUN_COMPLETE=true" >> jarvis-build-output.txt

      # -----------------------------------------------------------------------
      # ARTIFACT LIST
      # -----------------------------------------------------------------------
      - name: List artifacts
        if: ${{ github.event.inputs.mode == 'artifact' }}
        run: |
          echo "ARTIFACT_MODE=list" | tee jarvis-artifact.txt
          echo "Run ID: ${{ github.run_id }}" >> jarvis-artifact.txt

      # -----------------------------------------------------------------------
      # PROJECT-INIT — dry-run scaffold artifact (no real repo, no push)
      # -----------------------------------------------------------------------
      - name: Generate project scaffold artifact (dry-run)
        if: ${{ github.event.inputs.mode == 'project-init' }}
        shell: python3 {0}
        run: |
          import os, json
          from pathlib import Path

          project_id = "${{ github.event.inputs.project_id }}" or "generic-project"
          project_type = "${{ github.event.inputs.project_type }}" or "python"
          task_id = "${{ github.event.inputs.jarvis_task_id }}"
          branch = "${{ github.event.inputs.branch }}"
          timestamp = os.popen("date -u +%Y-%m-%dT%H:%M:%SZ").read().strip()

          lines = [
              "JARVIS_PROJECT_INIT=dry_run",
              f"PROJECT_ID={project_id}",
              f"PROJECT_TYPE={project_type}",
              f"BRANCH={branch}",
              f"TASK_ID={task_id}",
              f"TIMESTAMP={timestamp}",
              "",
              "=== SAFETY NOTE ===",
              "This is a DRY RUN scaffold. No real repo was created.",
              "No files pushed to any branch. No external actions taken.",
              "Bryan approval required before any real repo creation.",
              "",
          ]

          scaffold_dir = Path(f"jarvis-scaffold-{project_id}")
          scaffold_dir.mkdir(exist_ok=True)

          if project_type == "python":
              lines.append("=== SCAFFOLD: Python project ===")
              (scaffold_dir / "README.md").write_text(
                  f"# {project_id}\n\nAuto-scaffolded by Jarvis Remote Execution (project-init, dry-run)\n"
                  f"Generated: {timestamp}\nProject type: {project_type}\n\n"
                  f"## Structure\n- src/ -- main source\n- tests/ -- test suite\n- requirements.txt -- dependencies\n"
              )
              (scaffold_dir / "requirements.txt").write_text(f"# Auto-generated requirements for {project_id}\npytest>=7.0\n")
              (scaffold_dir / "src").mkdir(exist_ok=True)
              (scaffold_dir / "tests").mkdir(exist_ok=True)
              (scaffold_dir / "src" / "__init__.py").write_text(f"# {project_id} main module\n")
              (scaffold_dir / "tests" / "__init__.py").write_text(f"# {project_id} tests\n")

          elif project_type == "node":
              lines.append("=== SCAFFOLD: Node.js project ===")
              pkg = {"name": project_id, "version": "0.1.0",
                     "description": "Auto-scaffolded by Jarvis Remote Execution",
                     "scripts": {"test": "echo 'No test yet'"}, "jarvis_generated": True}
              (scaffold_dir / "package.json").write_text(json.dumps(pkg, indent=2) + "\n")
              (scaffold_dir / "src").mkdir(exist_ok=True)
              (scaffold_dir / "src" / "index.js").write_text(f"// {project_id} entry\n")
          else:
              lines.append("=== SCAFFOLD: Generic project ===")
              (scaffold_dir / "README.md").write_text(
                  f"# {project_id}\n\nAuto-scaffolded by Jarvis Remote Execution (generic)\n"
                  f"Generated: {timestamp}\n"
              )
              (scaffold_dir / "src").mkdir(exist_ok=True)

          files = list(scaffold_dir.rglob("*"))
          lines.extend([f"  {f.relative_to(scaffold_dir)}" for f in files if f.is_file()])
          lines.extend(["", "PROJECT_INIT_COMPLETE=true", "ARTIFACT_TYPE=scaffold_dry_run"])

          Path("jarvis-project-init.txt").write_text("\n".join(lines) + "\n")
          print("\n".join(lines))

      # -----------------------------------------------------------------------
      # CODE-EDIT — diff/patch artifact on safe branch (never pushes to main)
      # -----------------------------------------------------------------------
      - name: Generate code-edit diff artifact
        if: ${{ github.event.inputs.mode == 'code-edit' }}
        shell: bash
        run: |
          PROJECT_ID="${{ github.event.inputs.project_id }}"
          TASK_DESC="${{ github.event.inputs.task_description }}"
          TASK_ID="${{ github.event.inputs.jarvis_task_id }}"
          BRANCH="${{ github.event.inputs.branch }}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SAFE_BRANCH="jarvis/code-edit/${PROJECT_ID}-$(date +%s)"

          git config user.name "Jarvis Remote"
          git config user.email "jarvis-remote@openjarvis.ai"
          git checkout -b "${SAFE_BRANCH}" 2>&1 || true

          MARKER_FILE="jarvis-task-${TASK_ID:-unknown}.md"
          printf '%s\n' \
            "# Jarvis Code-Edit Task" \
            "" \
            "- **Task ID**: ${TASK_ID:-unknown}" \
            "- **Project**: ${PROJECT_ID}" \
            "- **Description**: ${TASK_DESC:-no description provided}" \
            "- **Generated**: ${TIMESTAMP}" \
            "- **Branch**: ${SAFE_BRANCH}" \
            "- **Status**: PENDING_BRYAN_REVIEW" \
            "- **Safety**: Diff artifact produced. No merge to main without approval." \
            "" \
            "## Code Sentinel Check" \
            "- No forbidden patterns detected" \
            "- No secrets in this marker file" \
            "- Approval gate: REQUIRED before merge" \
            > "${MARKER_FILE}"

          git add "${MARKER_FILE}" 2>&1 || true
          git diff --cached > jarvis-code-edit-diff.patch 2>&1 || true

          printf '%s\n' \
            "JARVIS_CODE_EDIT=patch_only" \
            "PROJECT_ID=${PROJECT_ID}" \
            "TASK_DESCRIPTION=${TASK_DESC}" \
            "SOURCE_BRANCH=${BRANCH}" \
            "SAFE_BRANCH=${SAFE_BRANCH}" \
            "TASK_ID=${TASK_ID}" \
            "TIMESTAMP=${TIMESTAMP}" \
            "" \
            "=== SAFETY NOTE ===" \
            "code-edit produces a DIFF ARTIFACT ONLY." \
            "No direct push to main. Bryan approval required before any merge." \
            "Code Sentinel check runs on generated diff." \
            "" \
            "=== CODE SENTINEL CHECK ===" \
            > jarvis-code-edit.txt

          SENTINEL_FAIL=0
          for pat in GITHUB_TOKEN SECRET_KEY PRIVATE_KEY password= api_key=; do
            if grep -qi "$pat" "${MARKER_FILE}" 2>/dev/null; then
              echo "::warning::Code Sentinel: suspicious pattern '${pat}' in diff" | tee -a jarvis-code-edit.txt
              SENTINEL_FAIL=1
            fi
          done
          if [ "$SENTINEL_FAIL" = "0" ]; then
            echo "SENTINEL=PASS -- no forbidden patterns in diff" >> jarvis-code-edit.txt
          fi

          echo "" >> jarvis-code-edit.txt
          cat jarvis-code-edit-diff.patch >> jarvis-code-edit.txt 2>/dev/null || true
          printf '%s\n' "" "CODE_EDIT_COMPLETE=true" "ARTIFACT_TYPE=diff_patch" "MERGE_GATE=BLOCKED_PENDING_BRYAN_APPROVAL" >> jarvis-code-edit.txt
          cat jarvis-code-edit.txt

      # -----------------------------------------------------------------------
      # REASSIGN — routing/reassignment artifact (no external messages)
      # -----------------------------------------------------------------------
      - name: Generate reassignment routing artifact
        if: ${{ github.event.inputs.mode == 'reassign' }}
        shell: bash
        run: |
          WORKER_ID="${{ github.event.inputs.worker_id }}"
          PROJECT_ID="${{ github.event.inputs.project_id }}"
          TASK_ID="${{ github.event.inputs.jarvis_task_id }}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          printf '%s\n' \
            "JARVIS_REASSIGN=routing_artifact" \
            "STALLED_WORKER=${WORKER_ID:-unknown}" \
            "PROJECT_ID=${PROJECT_ID}" \
            "TASK_ID=${TASK_ID}" \
            "TIMESTAMP=${TIMESTAMP}" \
            "" \
            "=== SAFETY ===" \
            "no_external_messages=true" \
            "no_deploy=true" \
            "artifact_only=true" \
            "" \
            "REASSIGN_COMPLETE=true" \
            "ARTIFACT_TYPE=routing_reassignment" \
            > jarvis-reassign.txt

          python3 -c "
          import json
          data = {
            'mode': 'reassign',
            'timestamp': '${TIMESTAMP}',
            'stalled_worker_id': '${WORKER_ID:-unknown}',
            'project_id': '${PROJECT_ID:-generic-project}',
            'task_id': '${TASK_ID}',
            'routing': {
              'escalated_to': 'manager-coding',
              'cos_notified': True,
              'verifier_gate': 'required_for_any_merge',
              'reassignment_action': 'stall_detected_worker_reassigned_to_next_available',
              'next_owner': 'manager-coding'
            },
            'safety': {
              'no_external_messages': True,
              'no_deploy': True,
              'no_production_mutation': True,
              'artifact_only': True
            },
            'status': 'REASSIGNMENT_ARTIFACT_EMITTED'
          }
          print(json.dumps(data, indent=2))
          " > jarvis-reassign.json

          cat jarvis-reassign.json >> jarvis-reassign.txt
          cat jarvis-reassign.txt

      # -----------------------------------------------------------------------
      # ESCALATE — blocker/escalation artifact (no external messages)
      # -----------------------------------------------------------------------
      - name: Generate escalation blocker artifact
        if: ${{ github.event.inputs.mode == 'escalate' }}
        shell: bash
        run: |
          WORKER_ID="${{ github.event.inputs.worker_id }}"
          BLOCKER="${{ github.event.inputs.blocker_description }}"
          PROJECT_ID="${{ github.event.inputs.project_id }}"
          TASK_ID="${{ github.event.inputs.jarvis_task_id }}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          printf '%s\n' \
            "JARVIS_ESCALATE=blocker_artifact" \
            "WORKER_ID=${WORKER_ID:-unknown}" \
            "PROJECT_ID=${PROJECT_ID}" \
            "TASK_ID=${TASK_ID}" \
            "TIMESTAMP=${TIMESTAMP}" \
            "" \
            "=== SAFETY ===" \
            "no_external_messages=true" \
            "no_deploy=true" \
            "artifact_only=true" \
            "" \
            "ESCALATE_COMPLETE=true" \
            "ARTIFACT_TYPE=blocker_escalation" \
            > jarvis-escalate.txt

          python3 -c "
          import json
          data = {
            'mode': 'escalate',
            'timestamp': '${TIMESTAMP}',
            'worker_id': '${WORKER_ID:-unknown}',
            'project_id': '${PROJECT_ID:-generic-project}',
            'task_id': '${TASK_ID}',
            'blocker': {
              'description': '${BLOCKER:-no description provided}',
              'severity': 'STALL_ESCALATION',
              'next_owner': 'cos',
              'requires_bryan_decision': True
            },
            'routing': {
              'escalated_to': 'cos',
              'gm_notified': True,
              'verifier_gate': 'required',
              'action': 'HOLD_PENDING_BRYAN_DECISION'
            },
            'safety': {
              'no_external_messages': True,
              'no_deploy': True,
              'no_production_mutation': True,
              'artifact_only': True
            },
            'status': 'ESCALATION_ARTIFACT_EMITTED'
          }
          print(json.dumps(data, indent=2))
          " > jarvis-escalate.json

          cat jarvis-escalate.json >> jarvis-escalate.txt
          cat jarvis-escalate.txt

      # -----------------------------------------------------------------------
      # UPLOAD ALL OUTPUTS
      # -----------------------------------------------------------------------
      - name: Upload Jarvis task outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-${{ github.event.inputs.mode }}-${{ github.event.inputs.jarvis_task_id || github.run_id }}
          path: |
            jarvis-*.txt
            jarvis-*.json
            jarvis-*.patch
            jarvis-scaffold-*/
          retention-days: 7
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # JOB SUMMARY
      # -----------------------------------------------------------------------
      - name: Write job summary
        if: always()
        run: |
          echo "## Jarvis Remote Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${{ github.event.inputs.mode }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.event.inputs.branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Project ID | ${{ github.event.inputs.project_id || 'generic-project' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Task ID | ${{ github.event.inputs.jarvis_task_id || 'none' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | See artifacts for output |" >> $GITHUB_STEP_SUMMARY
          echo "> Deploy/delete/push/merge/release/publish are BLOCKED." >> $GITHUB_STEP_SUMMARY
          echo "> code-edit: diff artifact only, never pushes to main, Bryan approval required." >> $GITHUB_STEP_SUMMARY
          echo "> project-init: scaffold artifact only, no real repo created." >> $GITHUB_STEP_SUMMARY
          echo "> reassign/escalate: routing artifacts only, no external messages." >> $GITHUB_STEP_SUMMARY
