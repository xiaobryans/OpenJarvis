# Railway deploy config for the VANTA WhatsApp webhook.
# Uses a Dockerfile build (reliable; avoids the nixpacks
# "$NIXPACKS_PATH undefined" error). The start command is the Dockerfile CMD.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
